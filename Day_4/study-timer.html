<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Timer - Student Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .timer-display {
            font-size: 6rem;
            font-weight: 700;
            text-align: center;
            letter-spacing: 4px;
            color: var(--text-primary);
            margin: 2rem 0;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }
        
        .timer-controls {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .timer-btn {
            font-size: 1.1rem;
            padding: 1rem 2.5rem;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="bubbles">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <img src="ucsc-logo.jpg" alt="UCSC Logo" class="nav-logo">
            Student Toolkit
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="gpa-calculator.html" class="nav-link">GPA Calculator</a></li>
            <li><a href="study-timer.html" class="nav-link active">Study Timer</a></li>
            <li>
                <button id="theme-toggle" class="glass-btn" style="padding: 0.5rem; border-radius: 50%;" title="Toggle Theme">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </li>
        </ul>
    </nav>

    <!-- Sidebar Element -->
    <button id="sidebar-toggle" class="glass-btn sidebar-toggle" title="Toggle Sidebar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    </button>
    <aside class="sidebar glass-card" id="events-sidebar">
        <div class="sidebar-content">
            <h2 class="sidebar-title">Upcoming Events</h2>
            <ul class="events-list">
                <li class="event-item">
                    <span class="event-date">Oct 12</span>
                    <span class="event-name">Midterm Exam</span>
                </li>
                <li class="event-item">
                    <span class="event-date">Oct 15</span>
                    <span class="event-name">Project Proposal Due</span>
                </li>
                <li class="event-item">
                    <span class="event-date">Oct 20</span>
                    <span class="event-name">Lab Assessment</span>
                </li>
            </ul>
        </div>
    </aside>

    <main class="container main-content">
        <div class="glass-card" style="margin-top: 5rem;">
            <header class="header">
                <h1>Pomodoro Timer</h1>
            </header>
            
            <section class="content-area">
                <p style="text-align: center; color: var(--text-muted);">
                    Focus for 25 minutes. No distractions.
                </p>
                
                <div class="timer-display" id="timer-display">
                    25:00
                </div>

                <div class="timer-controls">
                    <button id="start-btn" class="primary-btn timer-btn">Start</button>
                    <button id="reset-btn" class="glass-btn timer-btn">Reset</button>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="glass-footer">
            <p>Student Toolkit</p>
        </div>
    </footer>

    <script src="theme-script.js"></script>
    <script src="sidebar-script.js"></script>
    <script src="timer-script.js"></script>
</body>
</html>
