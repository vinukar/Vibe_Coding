<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator - Student Toolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="bubbles">
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
            <div class="bubble"></div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-brand">
            <img src="ucsc-logo.jpg" alt="UCSC Logo" class="nav-logo">
            Student Toolkit
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link">Home</a></li>
            <li><a href="gpa-calculator.html" class="nav-link active">GPA Calculator</a></li>
            <li><a href="study-timer.html" class="nav-link">Study Timer</a></li>
            <li>
                <button id="theme-toggle" class="glass-btn" style="padding: 0.5rem; border-radius: 50%;" title="Toggle Theme">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </li>
        </ul>
    </nav>

    <!-- Sidebar Element -->
    <button id="sidebar-toggle" class="glass-btn sidebar-toggle" title="Toggle Sidebar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
    </button>
    <aside class="sidebar glass-card" id="events-sidebar">
        <div class="sidebar-content">
            <h2 class="sidebar-title">Upcoming Events</h2>
            <ul class="events-list">
                <li class="event-item">
                    <span class="event-date">Oct 12</span>
                    <span class="event-name">Midterm Exam</span>
                </li>
                <li class="event-item">
                    <span class="event-date">Oct 15</span>
                    <span class="event-name">Project Proposal Due</span>
                </li>
                <li class="event-item">
                    <span class="event-date">Oct 20</span>
                    <span class="event-name">Lab Assessment</span>
                </li>
            </ul>
        </div>
    </aside>

    <main class="container main-content">
        <div class="glass-card" style="margin-top: 5rem;">
            <header class="header">
                <h1>Calculate Your GPA</h1>
            </header>

            <section class="content-area">
                <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem;">
                    Enter your courses and grades below to compute your GPA.
                </p>
                <div class="input-row gpa-inputs">
                    <input type="text" id="course-input" placeholder="Course Name" class="glass-input">
                    <input type="number" id="credits-input" placeholder="Credits" class="glass-input" min="1" max="10">
                    <input type="text" id="grade-input" placeholder="Grade (e.g. A+)" class="glass-input">
                    <button id="add-course-btn" class="primary-btn">Add Course</button>
                </div>

                <hr class="divider">

                <ul id="course-list" style="list-style: none; padding: 0; margin-bottom: 2rem;">
                    <!-- Courses will be injected here -->
                </ul>

                <hr class="divider">

                <div class="stats-section" style="text-align: center; font-size: 1.5rem;">
                    Total GPA: <span id="total-gpa" style="color: white; font-weight: 700;">0.00</span>
                </div>
            </section>
        </div>
    </main>



    <script src="theme-script.js"></script>
    <script src="sidebar-script.js"></script>
    <script src="gpa-script.js"></script>
</body>

</html>
