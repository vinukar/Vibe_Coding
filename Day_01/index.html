<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card - John</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <div class="profile-card" id="profileCard">
            <div class="card-header">
                <div class="image-placeholder">
                    <span>JD</span>
                </div>
            </div>
            <div class="card-body">
                <h1 class="name">John</h1>
                <p class="stream">Science Stream</p>
                <div class="divider"></div>
                <p class="bio">
                    John is a dedicated Computer Science student at the University of Colombo. 
                    He has a deep passion for <strong>Programming</strong>, <strong>Web Designing</strong>, 
                    and creating intuitive <strong>UX/UI Designs</strong>.
                </p>
                <div class="skills">
                    <span class="skill-tag">Web Design</span>
                    <span class="skill-tag">UX/UI</span>
                    <span class="skill-tag">Coding</span>
                </div>
            </div>
            <div class="card-footer">
                <button class="btn btn-primary">Message</button>
                <button class="btn btn-secondary">Portfolio</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
